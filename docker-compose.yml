services:

  backend:
    build:
      context: .
      dockerfile: ./dpdp-backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./dpdp-frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend

